<title>國際學術理論模型中文摘要追蹤</title>
<style>
  :root {
    --bg:#f8f7f4;--surface:#fff;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
    --text:#1a1a1a;--text-muted:#6b6b6b;--accent:#3B6D11;--accent-bg:#EAF3DE;--accent-text:#27500A;
    --tag-bg:#E6F1FB;--tag-text:#0C447C;--badge-bg:#EEEDFE;--badge-text:#3C3489;
    --radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1a1a18;--surface:#242422;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.18);
    --text:#f0ede8;--text-muted:#9a9890;--accent:#97C459;--accent-bg:#27500A;--accent-text:#C0DD97;
    --tag-bg:#0C447C;--tag-text:#B5D4F4;--badge-bg:#3C3489;--badge-text:#CECBF6;
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.6}
  header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:1.5rem 2rem;position:sticky;top:0;z-index:100}
  .header-inner{max-width:1100px;margin:0 auto}
  .site-title{font-size:18px;font-weight:600}
  .site-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
  .controls{max-width:1100px;margin:1.5rem auto;padding:0 2rem;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .search-wrap{flex:1;min-width:220px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:16px;height:16px}
  input[type=search]{width:100%;padding:9px 12px 9px 36px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none}
  input[type=search]:focus{border-color:var(--accent)}
  select{padding:9px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none;cursor:pointer}
  .count-badge{font-size:13px;color:var(--text-muted);margin-left:auto;white-space:nowrap}
  .updated-bar{max-width:1100px;margin:1rem auto 0;padding:0 2rem;font-size:13px;color:var(--text-muted)}
  .grid{max-width:1100px;margin:0 auto 3rem;padding:0 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:border-color 0.15s}
  .card:hover{border-color:var(--border-strong)}
  .card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cat-tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--tag-bg);color:var(--tag-text);font-weight:500}
  .date{font-size:12px;color:var(--text-muted);margin-left:auto}
  .card-title{font-size:15px;font-weight:600;line-height:1.4}
  .card-title-en{font-size:12px;color:var(--text-muted);line-height:1.4;margin-top:2px}
  .model-desc{font-size:13px;color:var(--text-muted);border-left:2px solid var(--accent);padding-left:10px;line-height:1.5}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--badge-bg);color:var(--badge-text)}
  .card-footer{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px;border-top:0.5px solid var(--border)}
  .authors{font-size:12px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .arxiv-link{font-size:12px;color:var(--accent-text);text-decoration:none;background:var(--accent-bg);padding:4px 10px;border-radius:20px;white-space:nowrap;font-weight:500}
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius);max-width:680px;width:100%;padding:2rem;position:relative;margin:auto}
  .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:22px;padding:4px 8px;border-radius:var(--radius-sm)}
  .modal-close:hover{background:var(--bg)}
  .modal h2{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:6px}
  .modal h3{font-size:14px;color:var(--text-muted);margin-bottom:1rem;font-weight:400;line-height:1.4}
  .section-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 6px}
  .modal-body p{font-size:14px;line-height:1.7}
  .modal-model{font-size:14px;line-height:1.6;background:var(--accent-bg);color:var(--accent-text);padding:12px 14px;border-radius:var(--radius-sm)}
  .modal-tags{display:flex;flex-wrap:wrap;gap:8px}
  .modal-tag{font-size:13px;padding:4px 12px;border-radius:20px;background:var(--badge-bg);color:var(--badge-text)}
  .modal-footer{margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border);display:flex;gap:10px;flex-wrap:wrap}
  .btn-primary{display:inline-block;padding:8px 18px;background:var(--accent-bg);color:var(--accent-text);border-radius:var(--radius-sm);text-decoration:none;font-size:14px;font-weight:500}
  .btn-secondary{display:inline-block;padding:8px 18px;border:0.5px solid var(--border-strong);color:var(--text);border-radius:var(--radius-sm);text-decoration:none;font-size:14px}
  .empty{grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)}
  @media(max-width:600px){.grid{grid-template-columns:1fr;padding:0 1rem}.controls{padding:0 1rem}header{padding:1rem}}
</style>

<script>
const DATA = {"generated_at":"2026-06-30T05:21:03.073565","query":"technology acceptance model","total":10,"papers":[{"paper_id":"2606.30644v1","title":"Testing the prevalence of hydrogen-silicate miscibility in young sub-Neptunes","abstract":"Hydrogen-silicate miscibility can significantly alter the interior structure and thermal evolution of sub-Neptunes. We consider the interplay between this miscibility and stellar-driven atmospheric escape. We find that, for the first $\\sim 100$ Myrs, sub-Neptunes store most of their hydrogen content within their miscible interiors, protecting it from escape. As hydrogen is removed from the top of the atmosphere, more hydrogen is exsolved from the miscible interior, resupplying the envelope mass and delaying the planet's contraction when compared with models that do not account for miscibility. Regardless of miscibility, atmospheric escape reproduces the young planet observations from TESS, and we highlight the emergence of the primordial Neptune desert at short orbital periods. We construct a population-level test for the prevalence of miscible sub-Neptunes which exploits their slower radial contraction. We find that $\\sim 70-100$ observed young sub-Neptunes with ages $\\lesssim 100$ Myrs are required to answer this question.","authors":["James G. Rogers","Hilke E. Schlichting"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30644v1","categories":["astro-ph.EP"],"arxiv_url":"https://arxiv.org/abs/2606.30644v1","chinese_title":"探討年輕亞海王星中氫-矽酸鹽混溶性的普遍性","chinese_summary":"這篇論文深入探討了氫-矽酸鹽混溶性對亞海王星內部結構與熱演化的關鍵影響，並將其與恆星驅動的大氣逸散過程結合考量。研究發現，在行星生命最初約1億年內，亞海王星大部分氫儲存於其可混溶的內部，有效保護其免受逸散。當大氣頂部氫氣流失時，混溶內部會持續析出氫氣，補充包層質量，相較於不考慮混溶性的模型，這顯著延遲了行星的收縮過程。研究進一步指出，無論是否納入混溶性，大氣逸散機制都能成功解釋TESS觀測到的年輕行星特性，並揭示了短軌道週期處原始海王星荒漠的形成。本研究提出了一種利用行星較慢徑向收縮特性，來檢驗可混溶亞海王星普及程度的群體層次測試方法，並估計需要約70至100顆年齡小於1億年的年輕亞海王星觀測數據，才能有效回答此科學問題。","model_description":"本研究的理論框架探討氫-矽酸鹽混溶性在年輕亞海王星內部的重要性。其核心機制為：在行星演化初期，混溶性內部能夠儲存大量氫，保護其免受大氣逸散。當大氣逸散導致氫流失時，混溶內部會釋放氫氣以補充行星包層，這使得行星的徑向收縮速度減緩。該模型將此機制納入行星演化模擬中，並基於混溶性引起的收縮延遲效應，提出了一種檢驗混溶亞海王星普遍性的群體層次測試方法。","key_concepts":["氫-矽酸鹽混溶性","亞海王星","大氣逸散","行星徑向收縮","群體層次測試"]},{"paper_id":"2606.30642v1","title":"LeVo 2: Stable and Melodious Song Generation via Hierarchical Representation Modeling and Progressive Post-Training","abstract":"Full-length song generation must preserve coherence and musicality, render detailed vocal and accompaniment acoustics, and follow lyrics and prompts. Existing language model-based systems face a structural trade-off: mixed-token modeling preserves vocal-instrument coordination but obscures track-specific details, whereas dual-track prediction improves acoustics but requires longer sequences and weakens global planning. We present LeVo 2, a hybrid LLM-Diffusion framework for controllable full-length song generation. LeVo 2 formulates this trade-off as hierarchical modeling: LeLM first predicts mixed tokens for semantic planning, then predicts vocal and accompaniment tokens in parallel for track-specific refinement, while a diffusion-based Music Codec reconstructs full-length waveforms. A central contribution of this extended version is an aesthetics-guided training schedule for alignment. During pre-training, an automated music aesthetic evaluation framework assigns musicality-tier conditions to large-scale data, providing musicality priors before preference alignment. Progressive post-training applies SFT, large-scale offline DPO, and closed-loop semi-online DPO to separately improve generation quality, controllability, and musicality. Modular extension then trains the Track-Specific LM for acoustic refinement while preserving the aligned semantic planner. This schedule separates musicality learning, controllability alignment, and acoustic refinement, mitigating optimization conflict and the limitations of static offline preference pairs. Expert listening tests and objective evaluations show that LeVo 2 outperforms open-source baselines across six subjective dimensions, and approaches leading commercial systems on several listening metrics. Ablations validate the effects of the training strategy, aesthetics guidance, scaling, and hierarchical architecture.","authors":["Shun Lei","Huaicheng Zhang","Dapeng Wu","Yaoxun Xu","Lishi Zuo","Wei Tan","Hangting Chen","Guangzheng Li","Jianwei Yu","Zhiyong Wu","Dong Yu"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30642v1","categories":["cs.SD"],"arxiv_url":"https://arxiv.org/abs/2606.30642v1","chinese_title":"LeVo 2：透過分層表徵建模與漸進式後訓練實現穩定且旋律優美的歌曲生成","chinese_summary":"現有語言模型在長篇歌曲生成上面臨連貫性與音樂性、細緻聲學及歌詞提示遵循的挑戰，並存在混合標記與雙軌預測的結構權衡。LeVo 2提出一個混合式大型語言模型-擴散模型框架，透過分層建模策略解決此問題：LeLM首先進行語義規劃，再平行預測人聲與伴奏標記以精煉細節，並結合擴散模型重建波形。其核心貢獻在於美學引導的訓練排程，透過預訓練賦予音樂性先驗，並在漸進式後訓練中利用SFT與DPO提升生成品質、可控性與音樂性，最終透過模組化擴展實現聲學精煉。","model_description":"LeVo 2是一個混合式大型語言模型-擴散模型框架，透過分層建模實現歌曲生成。LeLM首先進行語義規劃，隨後平行精煉人聲與伴奏，並由擴散模型重建音訊。其獨特之處在於美學引導的漸進式訓練排程，用以提升音樂性、可控性與聲學細節。","key_concepts":["分層表徵建模","漸進式後訓練","混合式大型語言模型-擴散框架","美學引導訓練","長篇歌曲生成"]},{"paper_id":"2606.30639v1","title":"Self-Evolving World Models for LLM Agent Planning","abstract":"World models offer a principled way to equip long-horizon LLM agents with foresight: predictions of action consequences before execution. However, unreliable foresight can be ignored, misused, or even degrade downstream decision-making. In this paper, we introduce WorldEvolver, a self-evolving world model framework that revises its deployment-time context while keeping the downstream agent and all model parameters frozen. WorldEvolver integrates three modules: (i) Episodic Memory, which exploits real action transitions through retrieval-based simulation; (ii) Semantic Memory, which extracts persistent heuristic rules from prediction-observation mismatches; and (iii) Selective Foresight, which filters low-confidence predictions before integrating them into agent reasoning context. We evaluate WorldEvolver on ALFWorld and ScienceWorld, measuring world model prediction accuracy on Word2World and downstream agent success rate on AgentBoard. Extensive experiments show that WorldEvolver achieves the highest prediction accuracy across three backbones and leads other world model baselines on downstream agent success rate, demonstrating that test-time memory revision enhances both predictive fidelity and planning performance.","authors":["Xuan Zhang","Wenxuan Zhang","See-Kiong Ng","Yang Deng"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30639v1","categories":["cs.AI"],"arxiv_url":"https://arxiv.org/abs/2606.30639v1","chinese_title":"用於大型語言模型代理規劃的自演化世界模型","chinese_summary":"大型語言模型（LLM）代理的長期規劃仰賴世界模型提供行動後果預測，然而不可靠的預測會影響決策。本研究提出WorldEvolver框架，這是一個自演化世界模型，能在部署時修訂其情境上下文，同時凍結下游代理與模型參數。WorldEvolver整合了情節記憶（利用檢索模擬）、語義記憶（提取啟發式規則）和選擇性預見（過濾低置信度預測）三大模組。在ALFWorld和ScienceWorld上的實驗證明，WorldEvolver在預測準確性和代理成功率方面均超越基線，顯示測試時記憶修訂能顯著提升預測準確性和規劃效能。","model_description":"WorldEvolver是一個自演化世界模型框架，其核心在於透過部署時的上下文修訂來提升LLM代理的預測與規劃能力。它由情節記憶、語義記憶和選擇性預見三個模組組成，旨在利用實際行動轉變、預測與觀察不匹配的經驗，並過濾不可靠預測，從而動態地精進其世界模型，無需重新訓練。","key_concepts":["世界模型","大型語言模型代理","自演化框架","情節記憶","語義記憶"]},{"paper_id":"2606.30634v1","title":"One-Step Gradient Delay is Not a Barrier for Large-Scale Asynchronous Pipeline Parallel LLM Pretraining","abstract":"Modern large-scale LLM pretraining benefits from utilizing Pipeline Parallelism; however, synchronous implementations leave GPUs idle during pipeline bubbles, wasting computational resources. Asynchronous Pipeline Parallelism eliminates these bubbles, maximizing throughput at the cost of gradient staleness. Among asynchronous schedules, PipeDream-2BW is particularly appealing: unlike the original PipeDream schedule, it ensures a constant one-step gradient delay regardless of pipeline depth. However, its adoption remains limited due to the common belief that optimizing under staleness is fundamentally unstable. In this work, we challenge this assumption, demonstrating that degradation under one-step delay depends strongly on optimizer choice rather than being an intrinsic limitation. We provide the first comprehensive empirical analysis showing that while AdamW, the predominant optimizer at the time when PipeDream-2BW was introduced, indeed suffers from severe degradation, recent methods like Muon exhibit strong robustness under a one-step delay. We introduce an optimizer-agnostic Error Feedback-inspired correction to further mitigate delay effects. We provide supporting theoretical analysis demonstrating convergence for Muon with and without this correction. Extensive evaluation on models up to 10B parameters confirms that our strategies bridge the performance gap with synchronous training, highlighting the practical potential of asynchronous pipeline parallelism at scale.","authors":["Philip Zmushko","Egor Petrov","Nursultan Abdullaev","Mikhail Khrushchev","Samuel Horváth"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30634v1","categories":["cs.LG"],"arxiv_url":"https://arxiv.org/abs/2606.30634v1","chinese_title":"一步梯度延遲並非大規模異步管線平行預訓練大型語言模型的障礙","chinese_summary":"現代大規模LLM預訓練中，同步管線平行化造成資源浪費，異步方法雖消除閒置卻引入梯度陳舊性。PipeDream-2BW的一步梯度延遲常被誤解為不穩定。本研究挑戰此觀點，揭示性能下降取決於優化器選擇。實證顯示，AdamW表現不佳，但Muon等新優化器對一步延遲具強勁魯棒性。論文提出一種基於錯誤回饋的校正方法，並為Muon收斂提供理論分析。高達100億參數模型評估證實，本策略有效縮小與同步訓練的性能差距，展現異步管線平行化的巨大潛力。","model_description":"本研究未提出獨立理論模型，但提出一種受錯誤回饋啟發的優化器無關校正方法，旨在緩解異步管線平行化中一步梯度延遲的影響。論文同時對Muon優化器在有/無此校正下，於存在梯度延遲的環境中實現收斂性提供了理論分析，並對PipeDream-2BW的穩定性進行了重新評估與實證分析。","key_concepts":["異步管線平行化","梯度延遲","大型語言模型預訓練","優化器選擇","錯誤回饋校正"]},{"paper_id":"2606.30633v1","title":"GIGA-Lens 2.0: Strong-Lens Modeling on Multiple GPU Nodes","abstract":"We present GIGA-Lens 2.0: a major upgrade to the GPU-accelerated Bayesian framework for modeling strong lensing systems that allows it to be run across multiple GPU nodes. We have succeeded in running GIGA-Lens 2.0 on 128 nodes or 512 A100 GPUs. We demonstrate the speed benefits of this new version, and apply them to modeling 100 simulated systems and a real system, DESI J238.5690+04.7276. We also present other changes to the framework that have yielded further improvement on performance.","authors":["Xiaosheng Huang","Linus Upson","Nicolas Ratier-Werbin","Harry Lu","Sean Xu","Elden Yap","Evan Odell","Ansel Parke","Harsh Ambardekar","Saul Baltasar","Nestor Demeure","Bradley Richardson","Andi Gu","Yuan-Ming Hsu","Junyi Liu"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30633v1","categories":["astro-ph.CO"],"arxiv_url":"https://arxiv.org/abs/2606.30633v1","chinese_title":"GIGA-Lens 2.0：基於多GPU節點的強重力透鏡建模","chinese_summary":"本研究發表了GIGA-Lens 2.0，這是一個針對強重力透鏡系統建模的GPU加速貝葉斯框架的重大升級。此版本突破性地支援跨多個GPU節點運行，並已成功在128個節點或512個A100 GPU上進行運算。研究展示了其顯著的速度提升，並將其應用於100個模擬系統及一個真實系統DESI J238.5690+04.7276的建模。此外，論文也介紹了框架中其他有助於性能改進的變革，極大地提升了複雜強透鏡系統的分析效率和規模。","model_description":"GIGA-Lens 2.0 是一個GPU加速的貝葉斯框架，專為強重力透鏡系統的精確建模而設計。其核心在於利用貝葉斯推斷來分析觀測數據，並通過GPU加速技術實現高效計算。新版本特別優化了在多GPU節點上的擴展性，大幅提升了處理複雜透鏡系統的能力。","key_concepts":["GIGA-Lens 2.0","強重力透鏡建模","GPU加速","貝葉斯框架","多GPU節點"]},{"paper_id":"2606.30632v1","title":"GROW$^2$: Grounding Which and Where for Robot Tool Use","abstract":"Can the robot use a plate to cut a cake if no knife is available? Tool use greatly expands robot capabilities, but to use tools creatively beyond their intended functions, the robot faces the challenge of $\\textit{open-world affordance grounding}$: select an open-category object to act as a tool and localize its specific region of action. To this end, we introduce GROW$^2$ (GROunding Which and Where), which leverages object parts as a natural abstraction to split the grounding process hierarchically into semantic and geometric levels, thus bypassing the need for data-heavy, end-to-end training. Semantically, GROW$^2$ harnesses the commonsense reasoning of Vision-Language Models (VLMs) to parse a natural-language task instruction, select a suitable object as the tool, and identify task-relevant parts on the tool and the target object. Geometrically, vision foundation models then ground the selected parts into precise 3D regions from a single RGB-D image. Experiments on established benchmarks show that GROW$^2$ outperforms state-of-the-art baselines on affordance prediction benchmarks. Further, it achieves zero-shot generalization over open-category objects and outperforms baselines in both simulated and real-world robot tool use experiments.","authors":["Yuhong Deng","Yuyao Liu","David Hsu"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30632v1","categories":["cs.RO"],"arxiv_url":"https://arxiv.org/abs/2606.30632v1","chinese_title":"GROW$^2$: 機器人工具使用中的「物體」與「部位」基礎對應","chinese_summary":"本論文介紹了 GROW$^2 模型，旨在解決機器人於開放世界中進行創造性工具使用時，如何選取合適工具並精確定位其作用區域的挑戰。GROW$^2 透過將基礎對應過程分層為語義和幾何兩個級別，利用物體部件作為自然抽象，有效規避了數據密集型端到端訓練。語義層面，它藉助視覺-語言模型解析指令、選擇工具並識別相關部件；幾何層面，則由視覺基礎模型從 RGB-D 圖像中精確定位這些部件的 3D 區域。實驗結果顯示，GROW$^2 在可供性預測基準上超越了現有技術，並在開放類別物體的零樣本泛化及模擬與真實世界的機器人工具使用任務中表現卓越。","model_description":"GROW$^2 是一個分層的基礎對應模型，它將機器人工具使用的過程分為語義和幾何兩個層次。語義層利用視覺-語言模型識別任務相關的工具及目標物體部件（Which），而幾何層則通過視覺基礎模型將這些部件精確定位到 3D 空間中的特定區域（Where），從而實現開放類別物體的創造性工具使用。","key_concepts":["機器人工具使用","開放世界可供性基礎對應","視覺-語言模型 (VLM)","分層基礎對應","零樣本泛化"]},{"paper_id":"2606.30627v1","title":"Pessimism's Paradox: Conservative Offline Training Amplifies Reward Hacking During Online Adaptation in Reasoning Models","abstract":"Conservative offline training is widely advocated as a safe foundation for subsequent online adaptation: if a policy stays close to well-supported behaviour, the argument goes, it is less likely to exploit imperfections in a learned reward model. We challenge this intuition empirically and mechanistically. We train a Qwen3-14B policy under Direct Preference Optimisation (DPO) with three levels of conservatism ($β\\in \\{β_{\\mathrm{lo}}, β_{\\mathrm{mid}}, β_{\\mathrm{hi}}\\}$ derived from empirical log-ratio percentiles), then adapt each checkpoint online against a learned reward ensemble (3\\,$\\times$\\,Qwen3-1.7B) while measuring true performance on GSM8K exact-answer accuracy. We find that \\emph{higher offline conservatism monotonically increases reward-hacking damage}, measured by the Goodhart gap and its area under the curve (AUGC), with Spearman $ρ= 1.0$ across all three conditions. Mechanistic analysis reveals a three-link causal chain: (i) high-$β$ DPO compresses policy entropy, (ii) Low-entropy policies generate responses with reduced diversity, concentrating in a narrow region of the reward model's training distribution (lower pairwise cosine distance), and (iii) despite this proximity, ensemble disagreement (epistemic uncertainty) increases with $β$ and is exploited faster during online optimisation. We further fit a power-law curve to the $(β, \\augc)$ data and identify a practical optimal conservatism level $β^{\\star}$ that balances alignment fidelity against hacking vulnerability. Our results suggest that the field needs \\emph{calibrated}, not \\emph{maximal}, conservatism.","authors":["Subramanyam Sahoo","Aman Chadha","Vinija Jain","Divya Chaudhary"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30627v1","categories":["cs.LG"],"arxiv_url":"https://arxiv.org/abs/2606.30627v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.30626v1","title":"DOPD: Dual On-policy Distillation","abstract":"On-policy distillation (OPD) offers superior capacity transfer by supervising student-sampled trajectories with dense token-level signals. To furnish high-quality supervision sources and thereby elevate the performance frontier of distillation, an intuitive direction is to infuse privileged information to either teacher or student itself. However, this additional input induces a potential failure mode we dub privilege illusion: a pattern that conflates the transferable capability gap that students are meant to close, and the information asymmetry gap that can only be mimicked but never replicated. This issue is further amplified by the inherent non-uniformity of token-level supervision, where only a small subset of tokens carries pivotal capability-bearing signals. To this end, we propose DOPD, an advantage-aware dual distillation paradigm that dynamically routes token-level supervision between privileged teacher and privileged student policies based on their advantage gap and relative probabilities. Each token receives supervision of different strength, objective, and strategy from either teacher or student itself, which transfers credible capability while simultaneously receiving auxiliary signals, to alleviate privilege illusion. Extensive experiments on both large language model (LLM) and vision-language model (VLM) settings demonstrate that DOPD consistently outperforms Vanilla OPD and other counterparts. Further results on stability, robustness, continual learning, and out-of-distribution tasks validate its superiority.","authors":["Xinlei Yu","Gen Li","Qingyi Si","Guibin Zhang","Yuqi Xu","Congcong Wang","Shuai Dong","Kaiwen Tuo","Xiangyu Zeng","Kaituo Feng","Qunzhong Wang","Yang Shi","Xiaobin Hu","Xiangyu Yue","Jiaqi Wang","Shuicheng Yan"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30626v1","categories":["cs.AI"],"arxiv_url":"https://arxiv.org/abs/2606.30626v1","chinese_title":"DOPD: 雙重在線策略蒸餾","chinese_summary":"在線策略蒸餾 (OPD) 利用密集令牌信號實現能力轉移。然而，引入特權資訊以提升性能時，易產生「特權錯覺」：混淆學生需彌補的能力差距與無法複製的資訊不對稱，且令牌級監督的非均勻性亦加劇此問題。為此，本研究提出 DOPD (雙重在線策略蒸餾)，一種感知優勢的雙重蒸餾範式。DOPD 依據特權師生策略間的優勢差距及相對機率，動態分配令牌級監督。每個令牌從師生接收不同強度、目標和策略的監督，有效轉移可信能力並緩解特權錯覺。在大型語言模型 (LLM) 和視覺-語言模型 (VLM) 上的廣泛實驗證明，DOPD 顯著優於傳統 OPD，並在穩定性、穩健性與持續學習方面表現出色。","model_description":"DOPD 是一種感知優勢的雙重蒸餾範式。其核心在於根據特權教師與特權學生策略之間的優勢差距及相對機率，動態引導令牌級監督。每個令牌從教師或學生本身接收不同強度、目標和策略的監督，旨在轉移可信能力，同時透過輔助信號緩解「特權錯覺」問題。","key_concepts":["在線策略蒸餾","特權錯覺","雙重蒸餾","令牌級監督","優勢感知"]},{"paper_id":"2606.30625v1","title":"Optimization Dynamics Imprint Semantic Specificity in Contrastive Embedding Norms","abstract":"Contrastive embedding models trained with scale-invariant losses are typically paired with distance metrics like cosine similarity, effectively ignoring embedding magnitudes. However, surprisingly, empirical studies reveal that despite this, these \"discarded\" norms seem to correlate with semantic properties such as concept specificity, token frequency, and human uncertainty. In this work, we provide a formal theoretical framework explaining this phenomenon. By analyzing the optimization dynamics, we derive an analytic formula demonstrating that embedding length naturally encodes this information as a byproduct of the training process. We also show how this gives rise to signals that can serve as \"free\" calibration tools in specific models and retrieval tasks, providing a grounded explanation for a previously heuristic observation.","authors":["Ziwei Su","Junyu Ren","Victor Veitch"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30625v1","categories":["stat.ML"],"arxiv_url":"https://arxiv.org/abs/2606.30625v1","chinese_title":"最佳化動態在對比嵌入範數中銘刻語義特異性","chinese_summary":"對比嵌入模型在與尺度不變損失函數共同訓練時，通常搭配餘弦相似度等距離度量，這實際上忽略了嵌入向量的幅度（範數）。然而，令人驚訝的實證研究卻揭示，這些在計算距離時「被捨棄」的範數，似乎與概念特異性、詞元頻率及人類不確定性等關鍵語義特性呈現顯著關聯。本研究旨在提供一個正式且嚴謹的理論框架來解釋此一出乎意料的現象。透過深入分析對比學習模型的最佳化動態，我們成功推導出一個分析公式，清晰地展示了嵌入向量的長度是如何作為訓練過程的自然副產品，自動編碼了這些重要的語義資訊。此外，我們也進一步闡述了這一發現如何產生有價值的訊號，可作為特定模型和資訊檢索任務中的「免費」校準工具，從而為此前僅憑經驗觀察到的現象提供了堅實的理論基礎與機制解釋。","model_description":"本研究提出了一個形式化的理論框架，其核心在於透過分析對比嵌入模型的最佳化動態，來解釋嵌入範數與語義特性的關聯。該框架推導出一個分析公式，揭示了在尺度不變損失訓練下，嵌入向量的長度會自然地作為訓練過程的副產品，自動編碼概念特異性、詞元頻率和人類不確定性等語義資訊。這表明了語義信息在模型訓練過程中如何自發地體現在向量範數中，而非透過顯式設計。","key_concepts":["對比嵌入模型","嵌入範數","語義特異性","最佳化動態","尺度不變損失"]},{"paper_id":"2606.30623v1","title":"When and Which Sensor to Observe? Timely Tracking of a Joint Markov Source","abstract":"We investigate the problem of remote estimation (at a monitor) of a discrete-time joint Markov process with individual components which can be observed with dedicated sensors. At a given time slot, the monitor has the option of staying idle or sending a pull request to one of the sensors to obtain a partial state value, while the sensors are assumed to have heterogeneous sampling costs. Our goal is to develop a monitor pull policy, i.e., determining when and towards which sensor to send a pull request, in order to minimize a weighted sum of average age of incorrect information (AoII), or in short age, and sampling costs. As the communication model, we assume an erasure channel with a fixed one-slot delay from each sensor to the monitor. In this setting, the monitor does not perfectly know either the state of the process or the age, at any given time. We first obtain a sufficient statistic, namely belief, representing the joint distribution of the age and the current state of the observed process, by using the history of all pull requests and observations. Then, we formulate the optimization problem as a continuous state-space Markov decision process (MDP), namely belief-MDP, for the solution of which we propose two model predictive control (MPC) methods, namely MPC without terminal costs (MPC-WTC), and reinforcement learning MPC (RL-MPC). The effectiveness of the proposed methods is validated by numerical examples.","authors":["Ismail Cosandal","Sennur Ulukus","Nail Akar"],"published":"2026-06-29","pdf_url":"https://arxiv.org/pdf/2606.30623v1","categories":["cs.IT"],"arxiv_url":"https://arxiv.org/abs/2606.30623v1","chinese_title":"聯合馬可夫源的即時追蹤：感測器觀察策略與時機優化","chinese_summary":"本研究探討遠端監測器估計離散時間聯合馬可夫過程的最佳策略，該過程的各組成部分可透過具備異質取樣成本的專用感測器進行觀察。核心目標是開發一套監測器拉取策略，精確決定何時以及向哪個感測器發送請求，以最小化錯誤資訊平均時間齡（AoII）與取樣成本的加權總和。通訊模型為從感測器到監測器帶有固定單槽延遲的擦除通道。在此不完美資訊環境下，監測器無法完全掌握過程狀態或時間齡。為此，研究首先基於歷史請求與觀察，推導出代表時間齡與當前狀態聯合分佈的充分統計量——「信念」。接著，將此最佳化問題建模為連續狀態空間的「信念-馬可夫決策過程」（Belief-MDP）。為求解此Belief-MDP，論文提出兩種模型預測控制（MPC）方法：不含終端成本的MPC（MPC-WTC）及強化學習MPC（RL-MPC）。數值範例證實了所提出方法的有效性。","model_description":"本研究將感測器觀察策略問題建模為「信念-馬可夫決策過程」（Belief-MDP）。此模型的核心是利用「信念」作為充分統計量，以應對監測器對狀態和資訊時間齡的不完全掌握。為有效求解此Belief-MDP，文中提出了兩種模型預測控制（MPC）方法：不含終端成本的MPC（MPC-WTC）以及結合強化學習的MPC（RL-MPC），旨在動態優化感測器觀察的時機與選擇。","key_concepts":["聯合馬可夫過程","遠端估計","錯誤資訊時間齡 (AoII)","信念馬可夫決策過程 (Belief-MDP)","模型預測控制 (MPC)"]}]};
const CAT_LABELS={"cs.LG":"機器學習","cs.CV":"電腦視覺","cs.RO":"機器人","cs.AI":"人工智慧","cs.CL":"自然語言","cs.IR":"資訊檢索","hep-ph":"高能物理","hep-ex":"實驗物理","astro-ph.GA":"天文星系","cond-mat.str-el":"凝態物理","quant-ph":"量子物理"};
function catLabel(c){return CAT_LABELS[c]||c}
let allPapers=DATA.papers||[],filteredPapers=[];
function init(){
  if(DATA.generated_at){const d=new Date(DATA.generated_at);document.getElementById("updated-bar").textContent="資料更新："+d.toLocaleDateString("zh-TW")+" "+d.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})+"　關鍵字："+(DATA.query||"")+"　共 "+DATA.total+" 篇"}
  const cats=new Set();allPapers.forEach(p=>(p.categories||[]).forEach(c=>cats.add(c)));
  const sel=document.getElementById("cat-filter");
  [...cats].sort().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=catLabel(c)+" ("+c+")";sel.appendChild(o)});
  render();
}
function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const cat=document.getElementById("cat-filter").value;
  const sort=document.getElementById("sort").value;
  filteredPapers=allPapers.filter(p=>{
    if(cat&&!(p.categories||[]).includes(cat))return false;
    if(!q)return true;
    return[p.title,p.chinese_title,p.chinese_summary,p.model_description,...(p.key_concepts||[])].join(" ").toLowerCase().includes(q);
  });
  if(sort==="date")filteredPapers.sort((a,b)=>(b.published||"").localeCompare(a.published||""));
  else filteredPapers.sort((a,b)=>(a.chinese_title||a.title).localeCompare(b.chinese_title||b.title,"zh-TW"));
  document.getElementById("count-badge").textContent="顯示 "+filteredPapers.length+" / "+allPapers.length+" 篇";
  const grid=document.getElementById("grid");
  if(!filteredPapers.length){grid.innerHTML='<div class="empty">找不到符合的論文</div>';return}
  grid.innerHTML=filteredPapers.map(cardHTML).join("");
  grid.querySelectorAll(".card").forEach((el,i)=>el.addEventListener("click",()=>openModal(filteredPapers[i])));
}
function cardHTML(p){
  const cats=(p.categories||[]).slice(0,2).map(c=>'<span class="cat-tag">'+catLabel(c)+'</span>').join("");
  const tags=(p.key_concepts||[]).slice(0,4).map(t=>'<span class="tag">'+t+'</span>').join("");
  const authors=(p.authors||[]).slice(0,3).join("、")+((p.authors||[]).length>3?" 等":"");
  const model=p.model_description&&p.model_description!=="本研究未提出獨立理論模型"?'<div class="model-desc">'+p.model_description+'</div>':"";
  return'<div class="card">'+'<div class="card-meta">'+cats+'<span class="date">'+(p.published||"")+'</span></div>'+'<div><div class="card-title">'+(p.chinese_title||p.title)+'</div>'+(p.chinese_title?'<div class="card-title-en">'+p.title+'</div>':"")+"</div>"+model+(tags?'<div class="tags">'+tags+"</div>":"")+'<div class="card-footer"><span class="authors">'+authors+'</span><a class="arxiv-link" href="'+p.arxiv_url+'" target="_blank" onclick="event.stopPropagation()">arXiv ↗</a></div></div>';
}
function openModal(p){
  const cats=(p.categories||[]).map(c=>'<span class="cat-tag">'+catLabel(c)+" ("+c+")"+'</span>').join(" ");
  const tags=(p.key_concepts||[]).map(t=>'<span class="modal-tag">'+t+'</span>').join("");
  let html='<div class="card-meta" style="margin-bottom:10px">'+cats+'<span class="date">'+(p.published||"")+'</span></div>'+'<h2>'+(p.chinese_title||p.title)+'</h2>'+(p.chinese_title?'<h3>'+p.title+'</h3>':"");
  html+='<div class="section-label">作者</div><p style="font-size:13px;color:var(--text-muted)">'+((p.authors||[]).join("、"))+'</p>';
  if(p.model_description&&p.model_description!=="本研究未提出獨立理論模型")html+='<div class="section-label">理論模型核心</div><div class="modal-model">'+p.model_description+'</div>';
  if(p.chinese_summary)html+='<div class="section-label">中文摘要</div><div class="modal-body"><p>'+p.chinese_summary+'</p></div>';
  if(p.key_concepts&&p.key_concepts.length)html+='<div class="section-label">關鍵概念</div><div class="modal-tags">'+tags+'</div>';
  if(!p.chinese_summary)html+='<div class="section-label">英文摘要</div><div class="modal-body"><p style="color:var(--text-muted)">'+(p.abstract||"（無摘要）")+'</p></div>';
  html+='<div class="modal-footer"><a class="btn-primary" href="'+p.arxiv_url+'" target="_blank">在 arXiv 查看原文 ↗</a>'+(p.pdf_url?'<a class="btn-secondary" href="'+p.pdf_url+'" target="_blank">下載 PDF</a>':"")+"</div>";
  document.getElementById("modal-content").innerHTML=html;
  document.getElementById("modal-backdrop").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modal-backdrop").classList.remove("open");document.body.style.overflow=""}
document.getElementById("modal-close").addEventListener("click",closeModal);
document.getElementById("modal-backdrop").addEventListener("click",e=>{if(e.target.classList.contains("modal-backdrop"))closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
document.getElementById("search").addEventListener("input",render);
document.getElementById("cat-filter").addEventListener("change",render);
document.getElementById("sort").addEventListener("change",render);
init();
</script>
</body>
</html>
