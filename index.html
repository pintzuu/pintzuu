<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國際學術理論模型中文摘要追蹤</title>
<style>
  :root {
    --bg:#f8f7f4;--surface:#fff;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
    --text:#1a1a1a;--text-muted:#6b6b6b;--accent:#3B6D11;--accent-bg:#EAF3DE;--accent-text:#27500A;
    --tag-bg:#E6F1FB;--tag-text:#0C447C;--badge-bg:#EEEDFE;--badge-text:#3C3489;
    --radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1a1a18;--surface:#242422;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.18);
    --text:#f0ede8;--text-muted:#9a9890;--accent:#97C459;--accent-bg:#27500A;--accent-text:#C0DD97;
    --tag-bg:#0C447C;--tag-text:#B5D4F4;--badge-bg:#3C3489;--badge-text:#CECBF6;
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.6}
  header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:1.5rem 2rem;position:sticky;top:0;z-index:100}
  .header-inner{max-width:1100px;margin:0 auto}
  .site-title{font-size:18px;font-weight:600}
  .site-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
  .controls{max-width:1100px;margin:1.5rem auto;padding:0 2rem;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .search-wrap{flex:1;min-width:220px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:16px;height:16px}
  input[type=search]{width:100%;padding:9px 12px 9px 36px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none}
  input[type=search]:focus{border-color:var(--accent)}
  select{padding:9px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none;cursor:pointer}
  .count-badge{font-size:13px;color:var(--text-muted);margin-left:auto;white-space:nowrap}
  .updated-bar{max-width:1100px;margin:1rem auto 0;padding:0 2rem;font-size:13px;color:var(--text-muted)}
  .grid{max-width:1100px;margin:0 auto 3rem;padding:0 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:border-color 0.15s}
  .card:hover{border-color:var(--border-strong)}
  .card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cat-tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--tag-bg);color:var(--tag-text);font-weight:500}
  .date{font-size:12px;color:var(--text-muted);margin-left:auto}
  .card-title{font-size:15px;font-weight:600;line-height:1.4}
  .card-title-en{font-size:12px;color:var(--text-muted);line-height:1.4;margin-top:2px}
  .model-desc{font-size:13px;color:var(--text-muted);border-left:2px solid var(--accent);padding-left:10px;line-height:1.5}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--badge-bg);color:var(--badge-text)}
  .card-footer{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px;border-top:0.5px solid var(--border)}
  .authors{font-size:12px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .arxiv-link{font-size:12px;color:var(--accent-text);text-decoration:none;background:var(--accent-bg);padding:4px 10px;border-radius:20px;white-space:nowrap;font-weight:500}
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius);max-width:680px;width:100%;padding:2rem;position:relative;margin:auto}
  .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:22px;padding:4px 8px;border-radius:var(--radius-sm)}
  .modal-close:hover{background:var(--bg)}
  .modal h2{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:6px}
  .modal h3{font-size:14px;color:var(--text-muted);margin-bottom:1rem;font-weight:400;line-height:1.4}
  .section-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 6px}
  .modal-body p{font-size:14px;line-height:1.7}
  .modal-model{font-size:14px;line-height:1.6;background:var(--accent-bg);color:var(--accent-text);padding:12px 14px;border-radius:var(--radius-sm)}
  .modal-tags{display:flex;flex-wrap:wrap;gap:8px}
  .modal-tag{font-size:13px;padding:4px 12px;border-radius:20px;background:var(--badge-bg);color:var(--badge-text)}
  .modal-footer{margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border);display:flex;gap:10px;flex-wrap:wrap}
  .btn-primary{display:inline-block;padding:8px 18px;background:var(--accent-bg);color:var(--accent-text);border-radius:var(--radius-sm);text-decoration:none;font-size:14px;font-weight:500}
  .btn-secondary{display:inline-block;padding:8px 18px;border:0.5px solid var(--border-strong);color:var(--text);border-radius:var(--radius-sm);text-decoration:none;font-size:14px}
  .empty{grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)}
  @media(max-width:600px){.grid{grid-template-columns:1fr;padding:0 1rem}.controls{padding:0 1rem}header{padding:1rem}}
</style>
</head>

<script>
const DATA = {"generated_at":"2026-06-25T07:56:05.813671","query":"technology acceptance model","total":10,"papers":[{"paper_id":"2606.26097v1","title":"Positron-Emitting and Electron-Capturing Double-Beta Processes in the Standard Model and Beyond","abstract":"We study positron-emitting and electron-capturing double-beta-decay modes as probes complementary to the usual double beta decay. Motivated by the proposed NuDoubt++ experiment, we analyze the candidate isotopes ${}^{78}$Kr, ${}^{106}$Cd, and ${}^{124}$Xe, providing nuclear matrix elements and phase-space factors for both neutrinoful and neutrinoless modes. For the Standard-Model channels, we find that $2ν$ECEC and $2νβ^+$EC are the most experimentally accessible, whereas $2νβ^+β^+$ remains strongly phase-space suppressed. For the neutrinoless channel, we interpret a projected sensitivity of $T_{1/2}^{0ν} = 10^{24}$ y in terms of dimension-seven SMEFT operators and find sensitivity to lepton-number-violating new-physics scales of order 1-100 TeV. We further show that measurements in multiple isotopes can help to resolve degeneracies in multi-operator scenarios, making positron-emitting double-beta searches a useful complement to conventional neutrinoless double beta decay experiments.","authors":["Lukáš Gráf","Jenni Kotila","Oliver Scholer"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26097v1","categories":["hep-ph"],"arxiv_url":"https://arxiv.org/abs/2606.26097v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26098v1","title":"A Population of Little Red Dot-like Quasars in SDSS","abstract":"Compact and red sources in the high redshift ($z\\sim5$) Universe, known as \"Little Red Dots\" (LRDs), are among JWST's most intriguing discoveries. These sources have broad Balmer emission lines, weak X-ray emission, and unique spectral energy distributions (SEDs) poorly fit by either stellar or AGN templates. Local analogs of LRDs allow for detailed studies of the underlying physical processes with archival multi-wavelength datasets unavailable in the high-$z$ Universe. We show that the SDSS $ugriz$ filters at $z\\approx0.4, 0.8$ overlap well with the JWST filters used to select LRDs at $z\\sim5$. We use SDSS quasars to define a sample of $\\sim1300$ Local Red Dots (LoRDs) which share the same photometric colors of LRDs. A subset of the LoRD sample selected to have V-shaped continua ($N=244$) show prominent higher-order Balmer absorption features and [NeV]$λ$3426 emission, both of which would likely be missed in JWST/PRISM observations given the low spectral resolution. A composite SED of the LoRDs differs from a typical quasar SED in the rest-frame UV/optical, but the two agree with each other in the NIR. The LoRD SED matches well with a stack of LRDs and can be modeled either as a reddened AGN combined with a host galaxy, or as a reddened AGN combined with a host galaxy and a cool blackbody. Interestingly, the LoRDs are X-ray detected at a rate comparable to typical quasars. However, the probability that LoRDs and typical quasars would go undetected, if subject to the LRD X-ray upper limits, is $>50\\%$.","authors":["Quinn O. Casey","Ryan C. Hickox","Nikko J. Cleri","Jonathan H. Cohn","David M. Alexander","Emmanuel Durodola","Kelly E. Whalen","Raphael E. Hviding","Tonima Tasnim Ananna"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26098v1","categories":["astro-ph.GA"],"arxiv_url":"https://arxiv.org/abs/2606.26098v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26096v1","title":"Higher Berry curvature, second Chern numbers and magnetoelectric coupling in crystalline insulators","abstract":"We rewrite a lattice model of the four-dimensional Chern insulator as a family of translationally-invariant infinite chains over the three-dimensional Brillouin zone and compute its higher three-form Berry curvature using infinite matrix product states (iMPS). We calculate the topological phase diagram of the associated Dixmier--Douady--Kapustin--Spodyneiko (DDKS) number as a function of the model's mass term, and show that it is exactly congruent to the phase diagram in terms of the second Chern number, the analytic expression of which is known for this particular model. This agreement demonstrates that higher Berry curvature can be used to compute second Chern numbers in a manifestly quantized manner. Motivated by the connection between the second Chern form and the Chern--Simons axion coupling, we study magnetoelectric coupling in three dimensions and its relation to higher Berry phases.","authors":["Niclas Heinsdorf","Ken Shiozaki"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26096v1","categories":["cond-mat.str-el"],"arxiv_url":"https://arxiv.org/abs/2606.26096v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26095v1","title":"Learning Action Priors for Cross-embodiment Robot Manipulation","abstract":"Most Vision-Language-Action (VLA) models build on a Vision-Language Model (VLM) backbone by attaching an action module and optimizing the full policy jointly. This design inherits strong visual and linguistic priors from the VLM, but leaves the action module to learn physical motion almost from scratch. As a result, the policy lacks an explicit motion prior, forcing early optimization to simultaneously discover temporal action dynamics and cross-modal alignment, a challenge further amplified in cross-embodiment settings. In this work, we propose to pretrain the action module with motion priors before cross-modal VLA alignment. Specifically, we introduce a two-stage training framework that equips the action module with cross-embodiment temporal motion structure before VLA training begins. In Stage~1, a lightweight flow-matching-based encoder-decoder action module efficiently learns temporal motion structure solely from unconditioned action trajectories, without processing visual or language tokens. In Stage~2, this learned prior is transferred to VLA training through decoder reuse and early-stage latent distillation, aligning visual-language features with the action embedding space while still allowing end-to-end policy refinement. In addition, the trained encoder serves as a compact history compressor, summarizing state-action histories into a single temporal context token for history-aware modeling at negligible cost. Extensive experiments across 13 diverse cross-embodiment tasks on both simulated and real-world platforms validate the effectiveness of our approach. Compared with VLA training without action priors, our model achieves faster convergence, higher success rates, and substantially stronger performance on data-scarce real-world tasks. Moreover, scaling up the action data in Stage~1 yields a more generalizable action prior that directly improves downstream VLA performance.","authors":["Dong Jing","Tianqi Zhang","Jiaqi Liu","Jinman Zhao","Zelong Sun","Li Erran Li","Zhiwu Lu","Mingyu Ding"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26095v1","categories":["cs.RO"],"arxiv_url":"https://arxiv.org/abs/2606.26095v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26094v1","title":"RevengeBench: Reverse Engineering Code-Space Policies from Behavioral Experiments","abstract":"For most of scientific history, researchers studying behavior could only infer hidden mechanisms from outward actions: an inverse problem that becomes more tractable when observation is augmented by targeted intervention. We pose a computational analogue: given only behavioral traces of an agent in a game environment, can a learner reconstruct the underlying decision program as executable code, and how much does this reconstruction improve with the ability to design controlled experiments? We introduce RevengeBench, a benchmark of 75 LLM generated, Elo-calibrated policies across five game environments, drawn from CodeClash tournament trajectories. The learner observes the hidden target policy play against sampled opponents and designs behavioral probes in the form of custom opponent policies that elicit informative behavior. It then submits an executable hypothesis, which is evaluated using continuous action-distance metrics. We further validate that recovered code carries informative signal in downstream player-versus-player tournaments. Across twelve frontier LLMs, recovery quality varies substantially (34 to 72% of initial distance closed), with reconstructed policies yielding measurable competitive advantage, particularly for weaker models that otherwise struggle to design effective counter-strategies. Our benchmark positions behavioral recovery of programmatic policies as a tractable inverse problem in code-space, opening a path to opponent modeling, policy interpretability, and the broader question of inferring latent mechanisms from observations.","authors":["Babak Rahmani","Sebastian Dziadzio","Joschka Strüber","Sergio Hernández-Gutiérrez","Matthias Bethge"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26094v1","categories":["cs.LG"],"arxiv_url":"https://arxiv.org/abs/2606.26094v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26093v1","title":"ForceBand: Learning Forceful Manipulation with sEMG","abstract":"Human demonstrations are a scalable data source for learning robot manipulation policies. However, common sources of human demonstration data, such as motion-capture trajectories and internet videos, capture mostly motion and appearance while missing the contact forces that are critical for force-sensitive manipulation. In this paper, we introduce ForceBand, a low-cost wrist-worn sEMG system that turns human muscle activity into force-enriched demonstrations. We first collect a 10-hour multimodal dataset containing egocentric video, sEMG, IMU, and fingertip force measurements across diverse actions and objects. Using this dataset, we pre-train an EMG2Force model that predicts per-finger forces from sEMG and IMU signals. After a short user-specific calibration, users can collect target-task demonstrations using only ForceBand and video; EMG2Force then labels these demonstrations with per-finger force traces, producing force-augmented demonstrations for robot policy learning. Experiments show that ForceBand recovers fine-grained fingertip interactions with over 50% lower force prediction error than vision-based baselines and achieves an 87% success rate on pick, squeeze, and place tasks that require object-specific force control across objects with diverse shapes, sizes, and weights. Project website: https://forceband-emg.github.io","authors":["Botao He","Zhi Wang","Linna Kuang","Ishaan Ghosh","Jitendra Malik","Cornelia Fermuller","Tingfan Wu","Jiayuan Mao","Ruoshi Liu","Haozhi Qi","Yiannis Aloimonos"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26093v1","categories":["cs.RO"],"arxiv_url":"https://arxiv.org/abs/2606.26093v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26091v1","title":"On-Policy Self-Distillation with Sampled Demonstrations Reduces Output Diversity","abstract":"On-policy self-distillation achieves strong pass@1 accuracy by using a single model as both teacher and student, with the teacher conditioned on a correct demonstration to provide dense token-level feedback. We show that this could come at a hidden cost: rollout diversity decreases and pass@k curves flatten (i.e., generating more rollouts fails to improve accuracy). We trace this to compounding biases in the design of self-distillation with sampled demonstrations. The teacher scores each student rollout while conditioned on a sampled correct rollout, channeling its feedback through the model's own biases. We theoretically analyze the optimal self-distillation policy and show that it tilts the base distribution by a pointwise conditional mutual information score between the student's rollout and the correct rollout used as context. Unlike the ideal optimal on-policy reinforcement learning (RL), which preserves probability ratios among equally correct rollouts, self-distillation can amplify existing probability gaps, concentrating mass on already-dominant modes. On a controlled graph path-finding task and science question-answering benchmarks, self-distilled models match or exceed RL on average performance but exhibit substantially lower functional and semantic diversity, failing on out-of-distribution settings that require diverse strategies.","authors":["Andrei Liviu Nicolicioiu","Mohammad Pezeshki","Aaron Courville"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26091v1","categories":["cs.LG"],"arxiv_url":"https://arxiv.org/abs/2606.26091v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26089v1","title":"Parnassus: A GPU-enabled, Python-based Package for Fast Particle Detector Simulation and Reconstruction","abstract":"We present the public software release of Parnassus, a Python/PyTorch, GPU-compatible framework for fast detector simulation and reconstruction in particle and nuclear physics. Parnassus provides a user-friendly framework with interchangeable detector models: neural models can emulate computationally expensive Geant4-based detector simulation and reconstruction chains, while parametric models provide PyTorch implementations of selected Delphes-style detector responses. This initial release includes two models of the CMS detector: one based on a flow-matching neural network architecture and one based on a PyTorch implementation of the Delphes CMS card (parametric bias and smearing). PyTorch versions of the ATLAS and ALEPH Delphes cards are also available, together with a flow-matching neural model of the ALEPH detector that extends the framework to the e+e- LEP environment. All detector-specific backends share the same process-agnostic and detector-agnostic API: users select a detector card - analogous to choosing a detector card in Delphes - and the same tool can be applied to new physics processes without retraining the released detector model. There are native interfaces to the event generator Pythia and the event clustering package FastJet. Unlike previous C++/ROOT-based tools, Parnassus provides GPU-capable PyTorch detector-response backends and requires no ROOT installation. We describe the installation, command-line and Python API, configuration system, and demonstrate the framework on Standard Model and BSM processes.","authors":["Abdelrahman Elabd","Eilam Gross","Dmitrii Kobylianskii","Benjamin Nachman"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26089v1","categories":["hep-ex"],"arxiv_url":"https://arxiv.org/abs/2606.26089v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26088v1","title":"Simulating Universal Quantum Gate Sets on Photonic OAM Qubits: Single-Qubit and Multi-Qubit Operations via Spatial Light Modulator Phase Holography","abstract":"Spatial light modulators (SLMs) have emerged as reconfigurable platforms for photonic quantum information processing, offering software-defined control over the orbital angular momentum (OAM) of light encoded in Laguerre-Gaussian (LG) beams. This paper presents a comprehensive simulation and hardware-grounded fidelity analysis of quantum gate operations implemented on the HOLOEYE LC 2012 transmissive SLM. A realistic three-channel noise model comprising 8-bit quantisation noise, twisted-nematic (TN) electronic and thermal noise, and phase-wrap clipping error is obtained from the manufacturer's datasheet without free-parameter fitting, yielding a total noise of $σ_{\\text{total}} = 92.4\\text{mrad}$. The complete universal single-qubit gate set $\\{X, Y, Z, S, T, H\\}$ and two-qubit entangling gates $\\{\\text{CNOT}, \\text{CZ}, \\text{SWAP}\\}$ are simulated on a $512 \\times 512$ computational grid. Results show that predicted gate fidelity are in the range of $F = 0.9914\\text{--}0.9936$, with fork grating gates limited primarily by TN noise and phase gates achieving higher fidelity owing to zero phase-wrap clipping error. In addition, Bell state preparation via the H-CNOT circuit achieves $F(Φ^+) = 0.9914$ after two SLM interactions. We benchmark our obtained results against six published experimental studies spanning the 78%--99.6% fidelity range. Finally, a wavelength-dependent analysis identifies 450--532 nm operation as the optimal regime for this device.","authors":["Saleha Maqsood","Muhammad Kamran","Tahir Malik"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26088v1","categories":["quant-ph"],"arxiv_url":"https://arxiv.org/abs/2606.26088v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]},{"paper_id":"2606.26087v1","title":"MVTrack4Gen: Multi-View Point Tracking as Geometric Supervision for 4D Video Generation","abstract":"Synthesizing a novel-view video from a monocular reference video along a target camera trajectory requires both geometric consistency and motion fidelity with respect to the reference video. Existing methods based on explicit 3D representations are limited by the accuracy of off-the-shelf reconstruction modules, which often produce inaccurate geometry for dynamic objects in monocular videos. In contrast, camera-conditioning-only methods can achieve high visual quality but often struggle to preserve geometric and motion consistency. In this work, we introduce MVTrack4Gen (Multi-View point Tracking for Novel-View Generation), a motion-aware training framework that leverages multi-view point tracking as an additional geometric and motion supervision signal for camera-conditioning-only novel-view video diffusion models. Our key finding is that specific attention layers encode strong correspondence cues, where query features attend to key features at geometrically corresponding locations across views and over time, and the misalignment of these correspondences causes motion inconsistency. Based on this observation, we route these features into an auxiliary multi-view tracking head and jointly train the diffusion model with a point-tracking objective. By explicitly strengthening these motion-aware correspondences, MVTrack4Gen improves existing models to better follow the motion in the reference view and maintain cross-view geometric consistency. Across diverse benchmarks, our method achieves state-of-the-art geometric consistency and competitive camera accuracy.","authors":["JoungBin Lee","Jaewoo Jung","Jongmin Lee","Tongmin Kim","Hyunsung Kim","Takuya Narihira","Kazumi Fukuda","Jahyeok Koo","Jisang Han","Yuki Mitsufuji","Seungryong Kim"],"published":"2026-06-24","pdf_url":"https://arxiv.org/pdf/2606.26087v1","categories":["cs.CV"],"arxiv_url":"https://arxiv.org/abs/2606.26087v1","chinese_title":"","chinese_summary":"","model_description":"","key_concepts":[]}]};
const CAT_LABELS={"cs.LG":"機器學習","cs.CV":"電腦視覺","cs.RO":"機器人","cs.AI":"人工智慧","cs.CL":"自然語言","cs.IR":"資訊檢索","hep-ph":"高能物理","hep-ex":"實驗物理","astro-ph.GA":"天文星系","cond-mat.str-el":"凝態物理","quant-ph":"量子物理"};
function catLabel(c){return CAT_LABELS[c]||c}
let allPapers=DATA.papers||[],filteredPapers=[];
function init(){
  if(DATA.generated_at){const d=new Date(DATA.generated_at);document.getElementById("updated-bar").textContent="資料更新："+d.toLocaleDateString("zh-TW")+" "+d.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})+"　關鍵字："+(DATA.query||"")+"　共 "+DATA.total+" 篇"}
  const cats=new Set();allPapers.forEach(p=>(p.categories||[]).forEach(c=>cats.add(c)));
  const sel=document.getElementById("cat-filter");
  [...cats].sort().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=catLabel(c)+" ("+c+")";sel.appendChild(o)});
  render();
}
function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const cat=document.getElementById("cat-filter").value;
  const sort=document.getElementById("sort").value;
  filteredPapers=allPapers.filter(p=>{
    if(cat&&!(p.categories||[]).includes(cat))return false;
    if(!q)return true;
    return[p.title,p.chinese_title,p.chinese_summary,p.model_description,...(p.key_concepts||[])].join(" ").toLowerCase().includes(q);
  });
  if(sort==="date")filteredPapers.sort((a,b)=>(b.published||"").localeCompare(a.published||""));
  else filteredPapers.sort((a,b)=>(a.chinese_title||a.title).localeCompare(b.chinese_title||b.title,"zh-TW"));
  document.getElementById("count-badge").textContent="顯示 "+filteredPapers.length+" / "+allPapers.length+" 篇";
  const grid=document.getElementById("grid");
  if(!filteredPapers.length){grid.innerHTML='<div class="empty">找不到符合的論文</div>';return}
  grid.innerHTML=filteredPapers.map(cardHTML).join("");
  grid.querySelectorAll(".card").forEach((el,i)=>el.addEventListener("click",()=>openModal(filteredPapers[i])));
}
function cardHTML(p){
  const cats=(p.categories||[]).slice(0,2).map(c=>'<span class="cat-tag">'+catLabel(c)+'</span>').join("");
  const tags=(p.key_concepts||[]).slice(0,4).map(t=>'<span class="tag">'+t+'</span>').join("");
  const authors=(p.authors||[]).slice(0,3).join("、")+((p.authors||[]).length>3?" 等":"");
  const model=p.model_description&&p.model_description!=="本研究未提出獨立理論模型"?'<div class="model-desc">'+p.model_description+'</div>':"";
  return'<div class="card">'+'<div class="card-meta">'+cats+'<span class="date">'+(p.published||"")+'</span></div>'+'<div><div class="card-title">'+(p.chinese_title||p.title)+'</div>'+(p.chinese_title?'<div class="card-title-en">'+p.title+'</div>':"")+"</div>"+model+(tags?'<div class="tags">'+tags+"</div>":"")+'<div class="card-footer"><span class="authors">'+authors+'</span><a class="arxiv-link" href="'+p.arxiv_url+'" target="_blank" onclick="event.stopPropagation()">arXiv ↗</a></div></div>';
}
function openModal(p){
  const cats=(p.categories||[]).map(c=>'<span class="cat-tag">'+catLabel(c)+" ("+c+")"+'</span>').join(" ");
  const tags=(p.key_concepts||[]).map(t=>'<span class="modal-tag">'+t+'</span>').join("");
  let html='<div class="card-meta" style="margin-bottom:10px">'+cats+'<span class="date">'+(p.published||"")+'</span></div>'+'<h2>'+(p.chinese_title||p.title)+'</h2>'+(p.chinese_title?'<h3>'+p.title+'</h3>':"");
  html+='<div class="section-label">作者</div><p style="font-size:13px;color:var(--text-muted)">'+((p.authors||[]).join("、"))+'</p>';
  if(p.model_description&&p.model_description!=="本研究未提出獨立理論模型")html+='<div class="section-label">理論模型核心</div><div class="modal-model">'+p.model_description+'</div>';
  if(p.chinese_summary)html+='<div class="section-label">中文摘要</div><div class="modal-body"><p>'+p.chinese_summary+'</p></div>';
  if(p.key_concepts&&p.key_concepts.length)html+='<div class="section-label">關鍵概念</div><div class="modal-tags">'+tags+'</div>';
  if(!p.chinese_summary)html+='<div class="section-label">英文摘要</div><div class="modal-body"><p style="color:var(--text-muted)">'+(p.abstract||"（無摘要）")+'</p></div>';
  html+='<div class="modal-footer"><a class="btn-primary" href="'+p.arxiv_url+'" target="_blank">在 arXiv 查看原文 ↗</a>'+(p.pdf_url?'<a class="btn-secondary" href="'+p.pdf_url+'" target="_blank">下載 PDF</a>':"")+"</div>";
  document.getElementById("modal-content").innerHTML=html;
  document.getElementById("modal-backdrop").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modal-backdrop").classList.remove("open");document.body.style.overflow=""}
document.getElementById("modal-close").addEventListener("click",closeModal);
document.getElementById("modal-backdrop").addEventListener("click",e=>{if(e.target.classList.contains("modal-backdrop"))closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
document.getElementById("search").addEventListener("input",render);
document.getElementById("cat-filter").addEventListener("change",render);
document.getElementById("sort").addEventListener("change",render);
init();
</script>
</body>
</html>
